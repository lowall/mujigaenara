      );

      const MemorialPage = () => (
        <PageWrapper bg="from-sky-100 via-white to-purple-100">
          <div className="pb-6">
            <div className="bg-white/70 backdrop-blur-md p-4 flex justify-between items-center sticky top-0 z-10">
              <button onClick={() => setCurrentPage('home')} className="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center text-purple-500 font-bold hover:bg-purple-200 transition">←</button>
              <span className="font-bold text-gray-600">오순이의 무지개나라 🌈</span>
              <button onClick={() => setShowShareModal(true)} className="w-10 h-10 bg-pink-100 rounded-full flex items-center justify-center text-pink-500 hover:bg-pink-200 transition">📤</button>
            </div>
            <div className="p-4">
              <div className={`bg-white/95 rounded-[2rem] ${cs} border-4 border-purple-100 overflow-hidden`}>
                <div className="h-4 flex">{['bg-red-400','bg-orange-400','bg-yellow-400','bg-green-400','bg-blue-400','bg-indigo-400','bg-purple-400'].map((c,i)=><div key={i} className={`flex-1 ${c}`}></div>)}</div>
                <div className="bg-gradient-to-b from-sky-100 to-white py-5 flex justify-center"><span className="text-3xl">☁️ ⭐ ☁️ 🌟 ☁️</span></div>
                <div className="flex justify-center -mt-8">
                  <div className={`w-36 h-36 border-4 border-white bg-gradient-to-br from-pink-100 via-purple-100 to-blue-100 rounded-full flex items-center justify-center relative ${cs}`}>
                    <span className="text-6xl">🐾</span>
                    <div className="absolute -top-2 -right-2 text-2xl">🌈</div>
                  </div>
                </div>
                <div className="text-center p-6">
                  <h1 className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500">오순아 잘 지내지? 💜</h1>
                  <p className="text-gray-400 mt-1 text-sm font-medium">2015.03.15 ~ 2026.01.20</p>
                  <div className="flex items-center justify-center my-5"><div className="flex-1 max-w-16"><RainbowBar /></div><span className="mx-3 text-xl">🌈</span><div className="flex-1 max-w-16"><RainbowBar /></div></div>
                  <p className="text-gray-500 leading-relaxed font-medium">11년간 우리 가족과 함께해줘서 고마워.<br/>무지개나라에서도 행복하게 뛰어놀아 💕</p>
                </div>
                <div className="px-5 pb-4">
                  <button onClick={() => setShowDonationListModal(true)} className="w-full bg-gradient-to-r from-pink-50 to-purple-50 rounded-2xl p-4 hover:scale-[1.01] transition">
                    <div className="flex justify-between items-center">
                      <div><p className="font-bold text-pink-600 text-sm">🌸 부조해주신 분들</p><p className="text-xs text-gray-500">{donationList.length}명이 마음을 전해주셨어요</p></div>
                      <span className="text-pink-300 text-xl">→</span>
                    </div>
                  </button>
                </div>
                <div className="px-5 pb-4">
                  <div className="bg-gradient-to-br from-purple-50 via-pink-50 to-blue-50 rounded-2xl p-4 space-y-3">
                    {messages.slice(0,2).map((item,i)=>(
                      <div key={i} className="flex items-start gap-3">
                        <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-purple-200 via-pink-200 to-blue-200 flex items-center justify-center">🐾</div>
                        <div><p className="font-bold text-sm text-purple-600">{item.name}</p><p className="text-gray-500 text-sm">{item.msg}</p></div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="p-5 pt-2 space-y-3">
                  <button onClick={() => setCurrentPage('messages')} className={`w-full py-4 bg-gradient-to-r from-cyan-400 via-blue-400 to-indigo-400 text-white font-black text-lg rounded-2xl ${cs} hover:scale-[1.02] transition-all`}>추모글 남기기 ✏️</button>
                  <button onClick={() => setShowDonationModal(true)} className={`w-full py-4 bg-gradient-to-r from-pink-400 via-rose-400 to-red-400 text-white font-black text-lg rounded-2xl ${cs} hover:scale-[1.02] transition-all`}>부조하기 🌸</button>
                </div>
              </div>
              <button onClick={() => setCurrentPage('album')} className={`w-full mt-4 bg-white/90 rounded-2xl p-4 ${cs} flex items-center justify-between hover:scale-[1.01] transition`}>
                <div className="flex items-center gap-3"><div className="w-12 h-12 bg-gradient-to-br from-purple-200 via-pink-200 to-blue-200 rounded-xl flex items-center justify-center text-2xl">📸</div><span className="font-bold text-gray-600">무지개나라 앨범</span></div>
                <span className="text-purple-300 text-xl">→</span>
              </button>
              <button onClick={() => setShowSupportModal(true)} className={`w-full mt-4 py-4 bg-gradient-to-r from-purple-100 via-pink-100 to-purple-100 rounded-2xl font-bold text-purple-600 ${cs} flex items-center justify-center gap-2 hover:scale-[1.01] transition`}>⭐ 무지개나라에 기부하기 ⭐</button>
            </div>
            {showDonationModal && <DonationModal />}
            {showSupportModal && <SupportModal />}
            {showShareModal && <ShareModal />}
            {showDonationListModal && <DonationListModal />}
          </div>
        </PageWrapper>
      );

      const AlbumPage = () => (
        <PageWrapper bg="from-purple-50 via-white to-pink-50">
          <div>
            <div className="bg-white/70 p-4 flex justify-between items-center sticky top-0">
              <button onClick={() => setCurrentPage('memorial')} className="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center text-purple-500 font-bold hover:bg-purple-200 transition">←</button>
              <span className="font-bold text-gray-600">무지개나라 앨범 🌈</span>
              <div className="w-10"></div>
            </div>
            <div className="p-4">
              <RainbowBar />
              <div className="grid grid-cols-2 gap-3 mt-4">
                {[1,2,3,4,5,6].map(i=>(
                  <div key={i} className={`aspect-square bg-gradient-to-br from-purple-100 via-pink-100 to-blue-100 rounded-2xl flex items-center justify-center ${cs} cursor-pointer hover:scale-[1.02] transition`}><span className="text-5xl">🐾</span></div>
                ))}
              </div>
              <p className="text-center text-gray-400 mt-6 font-medium">무지개나라의 추억들 🌈</p>
            </div>
          </div>
        </PageWrapper>
      );

      const MessagesPage = () => {
        const handleSend = () => {
          if (newMessage.trim()) {
            setMessages([{ name: '방문자', msg: newMessage, time: '방금 전' }, ...messages]);
            setNewMessage('');
          }
        };
        return (
          <PageWrapper bg="from-blue-50 via-white to-purple-50">
            <div className="pb-28">
              <div className="bg-white/70 p-4 flex justify-between items-center sticky top-0 z-10">
                <button onClick={() => setCurrentPage('memorial')} className="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-500 font-bold hover:bg-blue-200 transition">←</button>
                <span className="font-bold text-gray-600">추모글 💬</span>
                <div className="w-10"></div>
              </div>
              <div className="p-4"><RainbowBar /></div>
              <div className="px-4 space-y-4">
                {messages.map((item,i)=>(
                  <div key={i} className={`bg-white/90 rounded-2xl p-4 ${cs}`}>
                    <div className="flex items-center gap-3 mb-3">
                      <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-200 via-pink-200 to-blue-200 flex items-center justify-center">🐾</div>
                      <div><p className="font-bold text-purple-600">{item.name}</p><p className="text-xs text-gray-400">{item.time}</p></div>
                    </div>
                    <p className="text-gray-600 leading-relaxed">{item.msg}</p>
                  </div>
                ))}
              </div>
              <div className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md p-4 border-t border-purple-100 z-10">
                <div className="max-w-lg mx-auto flex gap-3">
                  <input type="text" placeholder="무지개나라에 메시지 보내기 🌈" value={newMessage} onChange={(e)=>setNewMessage(e.target.value)} onKeyPress={(e)=>e.key==='Enter'&&handleSend()} className="flex-1 p-4 bg-purple-50 rounded-full focus:ring-2 focus:ring-purple-300 outline-none" />
                  <button onClick={handleSend} className="px-6 py-4 bg-gradient-to-r from-purple-400 via-pink-400 to-blue-400 text-white font-bold rounded-full hover:scale-[1.02] transition">전송</button>
                </div>
              </div>
            </div>
          </PageWrapper>
        );
      };

      const AdminPage = () => (
        <PageWrapper bg="from-gray-100 to-gray-200">
          <div className="p-6">
            <button onClick={() => setCurrentPage('home')} className="text-gray-500 font-bold mb-6 flex items-center gap-2 hover:text-gray-700 transition">← 돌아가기</button>
            <h2 className="text-2xl font-black text-gray-700 mb-6">🔒 관리자 대시보드</h2>
            <div className="grid grid-cols-2 gap-3 mb-6">
              {[['전체 사용자', adminStats.totalUsers+'명', 'text-blue-500'],['추모공간', adminStats.totalMemorials+'개', 'text-purple-500'],['오늘 방문자', adminStats.todayVisitors+'명', 'text-green-500'],['이번달 신규', adminStats.thisMonthNewUsers+'명', 'text-orange-500']].map(([label,val,color],i)=>(
                <div key={i} className={`bg-white rounded-2xl p-4 ${cs}`}><p className="text-gray-400 text-xs font-medium">{label}</p><p className={`text-2xl font-black ${color}`}>{val}</p></div>
              ))}
            </div>
            <div className={`bg-gradient-to-r from-purple-100 to-pink-100 rounded-2xl p-5 ${cs} mb-4`}>
              <h3 className="font-bold text-purple-700 mb-2">💜 누적 기부금</h3>
              <p className="text-3xl font-black text-purple-600">{adminStats.totalSupport}원</p>
              <div className="mt-4 space-y-2">
                {supportList.map((item,i)=>(
                  <div key={i} className="bg-white/60 rounded-xl p-3 flex justify-between">
                    <div><p className="font-bold text-sm">{item.name}</p>{item.message && <p className="text-xs text-gray-500">"{item.message}"</p>}</div>
                    <div className="text-right"><p className="font-bold text-purple-600">{item.amount}원</p><p className="text-xs text-gray-400">{item.time}</p></div>
                  </div>
                ))}
              </div>
            </div>
            <div className={`bg-gradient-to-r from-pink-100 to-rose-100 rounded-2xl p-5 ${cs}`}>
              <h3 className="font-bold text-pink-700 mb-2">🌸 전체 부조금</h3>
              <p className="text-3xl font-black text-pink-600">{adminStats.totalDonations}원</p>
              <p className="text-xs text-pink-400 mt-1">100% 가족 전달</p>
            </div>
          </div>
        </PageWrapper>
      );

      const renderPage = () => {
        switch(currentPage) {
          case 'about': return <AboutPage />;
          case 'create': return <CreatePage />;
          case 'memorial': return <MemorialPage />;
          case 'album': return <AlbumPage />;
          case 'messages': return <MessagesPage />;
          case 'admin': return <AdminPage />;
          default: return <HomePage />;
        }
      };

      return <div>{renderPage()}</div>;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MujigaeNara />);
  </script>
</body>
</html>
