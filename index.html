<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>무지개나라 🌈</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
  </style>
  <script>
    // Firebase 초기화
    const firebaseConfig = {
      apiKey: "AIzaSyA4R0lsICQzNVduEifDg6Dj04cc6iHMcLE",
      authDomain: "mujigaenara-72d15.firebaseapp.com",
      projectId: "mujigaenara-72d15",
      storageBucket: "mujigaenara-72d15.firebasestorage.app",
      messagingSenderId: "931068854532",
      appId: "1:931068854532:web:4f6f40e7fe7009e940d051"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    const auth = firebase.auth();
    const googleProvider = new firebase.auth.GoogleAuthProvider();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // URL에서 memorial ID 읽기
    const getMemorialIdFromUrl = () => {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    };

    const MujigaeNara = () => {
      const [currentPage, setCurrentPage] = useState('home');
      const [showDonationModal, setShowDonationModal] = useState(false);
      const [showSupportModal, setShowSupportModal] = useState(false);
      const [showShareModal, setShowShareModal] = useState(false);
      const [showDonationListModal, setShowDonationListModal] = useState(false);
      const [copiedAccount, setCopiedAccount] = useState(false);
      const [copiedSupportAccount, setCopiedSupportAccount] = useState(false);
      const [copiedLink, setCopiedLink] = useState(false);
      const [donationMessage, setDonationMessage] = useState('');
      const [supportMessage, setSupportMessage] = useState('');
      const [donationComplete, setDonationComplete] = useState(false);
      const [supportComplete, setSupportComplete] = useState(false);

      // 추모공간 생성 폼
      const [formName, setFormName] = useState('');
      const [formStartDate, setFormStartDate] = useState('');
      const [formEndDate, setFormEndDate] = useState('');
      const [formMessage, setFormMessage] = useState('');
      const [formPhoto, setFormPhoto] = useState(null);
      const [formPhotoPreview, setFormPhotoPreview] = useState(null);
      const [formKakao, setFormKakao] = useState('');
      const [formToss, setFormToss] = useState('');
      const [formAccount, setFormAccount] = useState('');
      const [formAccountName, setFormAccountName] = useState('');
      const [creating, setCreating] = useState(false);
      const [createError, setCreateError] = useState('');

      // 현재 보고 있는 추모공간
      const [memorial, setMemorial] = useState(null);
      const [memorialId, setMemorialId] = useState(null);
      const [loadingMemorial, setLoadingMemorial] = useState(false);

      // 추모글
      const [messages, setMessages] = useState([]);
      const [newMessage, setNewMessage] = useState('');
      const [messageName, setMessageName] = useState(localStorage.getItem('mj_name') || '');
      const [sendingMsg, setSendingMsg] = useState(false);

      // 부조금 목록
      const [donationList, setDonationList] = useState([]);

      // 로그인 상태
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [myMemorials, setMyMemorials] = useState([]);

      // 추모공간 수정
      const [editMode, setEditMode] = useState(false);

      // slug
      const [formSlug, setFormSlug] = useState('');
      const [slugError, setSlugError] = useState('');

      const cs = "shadow-[4px_4px_0px_0px_rgba(0,0,0,0.08)]";

      // 로그인 상태 감지
      useEffect(() => {
        const unsub = auth.onAuthStateChanged(u => {
          setUser(u);
          setAuthLoading(false);
          if (u) loadMyMemorials(u.uid);
        });
        return () => unsub();
      }, []);

      // URL에 memorial ID 또는 slug로 바로 추모공간으로
      useEffect(() => {
        const id = getMemorialIdFromUrl();
        if (id) {
          // slug인지 doc id인지 판단 (slug는 짧고 한글/영문)
          if (id.length < 25) {
            // slug로 먼저 찾기
            db.collection('memorials').where('slug','==',id).limit(1).get().then(snap => {
              if (!snap.empty) loadMemorial(snap.docs[0].id);
              else loadMemorial(id); // fallback to doc id
            });
          } else {
            loadMemorial(id);
          }
        }
      }, []);

      // 내 추모공간 목록
      const loadMyMemorials = async (uid) => {
        const snap = await db.collection('memorials').where('uid','==',uid).orderBy('createdAt','desc').get();
        setMyMemorials(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      };

      // 구글 로그인
      const loginWithGoogle = async () => {
        try {
          await auth.signInWithPopup(googleProvider);
        } catch(e) { console.error(e); }
      };

      // 로그아웃
      const logout = async () => {
        await auth.signOut();
        setMyMemorials([]);
      };

      // 추모공간 불러오기
      const loadMemorial = async (id) => {
        setLoadingMemorial(true);
        try {
          const doc = await db.collection('memorials').doc(id).get();
          if (doc.exists) {
            setMemorial({ id: doc.id, ...doc.data() });
            setMemorialId(doc.id);
            setCurrentPage('memorial');
            // 추모글 불러오기
            loadMessages(doc.id);
          } else {
            alert('존재하지 않는 추모공간이에요 🌈');
          }
        } catch (e) {
          console.error(e);
        }
        setLoadingMemorial(false);
      };

      // 추모글 실시간 불러오기
      const loadMessages = (id) => {
        db.collection('memorials').doc(id).collection('messages')
          .orderBy('createdAt', 'desc')
          .onSnapshot(snapshot => {
            setMessages(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
          });
      };

      // 추모공간 생성
      const createMemorial = async () => {
        if (!formName.trim()) { setCreateError('이름을 입력해주세요'); return; }
        if (!user) { setCreateError('로그인이 필요해요'); return; }
        // slug 중복 체크
        if (formSlug.trim()) {
          const existing = await db.collection('memorials').where('slug','==',formSlug.trim()).get();
          if (!existing.empty) { setCreateError('이미 사용중인 URL이에요. 다른 이름을 써주세요'); return; }
        }
        setCreating(true);
        setCreateError('');
        try {
          let photoUrl = null;
          // 사진 업로드
          if (formPhoto) {
            const ref = storage.ref(`memorials/${Date.now()}_${formPhoto.name}`);
            await ref.put(formPhoto);
            photoUrl = await ref.getDownloadURL();
          }
          // Firestore에 저장
          const docRef = await db.collection('memorials').add({
            name: formName,
            startDate: formStartDate,
            endDate: formEndDate,
            message: formMessage,
            photoUrl,
            account: formAccount,
            accountName: formAccountName,
            slug: formSlug.trim() || null,
            uid: user.uid,
            ownerName: user.displayName,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          // URL 업데이트
          window.history.pushState({}, '', `?id=${docRef.id}`);
          await loadMemorial(docRef.id);
        } catch (e) {
          setCreateError('오류가 발생했어요. 다시 시도해주세요.');
          console.error(e);
        }
        setCreating(false);
      };

      // 추모글 전송
      const sendMessage = async () => {
        if (!newMessage.trim() || !memorialId) return;
        setSendingMsg(true);
        try {
          await db.collection('memorials').doc(memorialId).collection('messages').add({
            name: messageName.trim() || '익명',
            msg: newMessage.trim(),
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          setNewMessage('');
          setMessageName('');
        } catch (e) { console.error(e); }
        setSendingMsg(false);
      };

      // 추모공간 수정 저장
      const saveEditMemorial = async (updates) => {
        if (!memorial || !user || memorial.uid !== user.uid) return;
        try {
          await db.collection('memorials').doc(memorial.id).update(updates);
          setMemorial(prev => ({ ...prev, ...updates }));
          setEditMode(false);
        } catch(e) { console.error(e); }
      };

      const copyToClipboard = (text, type) => {
        navigator.clipboard.writeText(text);
        if (type === 'donation') { setCopiedAccount(true); setTimeout(() => setCopiedAccount(false), 2000); }
        else if (type === 'support') { setCopiedSupportAccount(true); setTimeout(() => setCopiedSupportAccount(false), 2000); }
        else { setCopiedLink(true); setTimeout(() => setCopiedLink(false), 2000); }
      };

      const handlePhotoChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          setFormPhoto(file);
          const reader = new FileReader();
          reader.onload = (ev) => setFormPhotoPreview(ev.target.result);
          reader.readAsDataURL(file);
        }
      };

      const RainbowBar = () => (
        <div className="flex h-2 w-full rounded-full overflow-hidden">
          {['bg-red-400','bg-orange-400','bg-yellow-400','bg-green-400','bg-blue-400','bg-indigo-400','bg-purple-400'].map((c,i) => (
            <div key={i} className={`flex-1 ${c}`}></div>
          ))}
        </div>
      );

      const PageWrapper = ({ children, bg = "from-sky-100 via-white to-purple-50" }) => (
        <div className={`min-h-screen bg-gradient-to-b ${bg}`}>
          <div className="max-w-lg mx-auto">{children}</div>
        </div>
      );

      // ── 홈 ──
      const HomePage = () => {
        const [visitId, setVisitId] = React.useState('');
        const handleVisit = () => { if(visitId.trim()) loadMemorial(visitId.trim()); };
        return (
          <PageWrapper>
            <div className="flex flex-col items-center justify-center min-h-screen p-8 relative overflow-hidden">
              <div className="absolute top-20 left-5 w-16 h-16 bg-red-200 rounded-full opacity-40 blur-sm"></div>
              <div className="absolute top-40 right-10 w-12 h-12 bg-orange-200 rounded-full opacity-50 blur-sm"></div>
              <div className="absolute bottom-40 left-10 w-12 h-12 bg-blue-200 rounded-full opacity-50 blur-sm"></div>
              <div className="absolute bottom-20 right-20 w-16 h-16 bg-purple-200 rounded-full opacity-40 blur-sm"></div>

              {/* 상단 로그인 바 */}
              <div className="absolute top-4 right-4 z-10">
                {user ? (
                  <div className="flex items-center gap-2">
                    <img src={user.photoURL} className="w-8 h-8 rounded-full" />
                    <button onClick={logout} className="text-xs text-gray-400 hover:text-gray-600 transition">로그아웃</button>
                  </div>
                ) : (
                  <button onClick={loginWithGoogle} className="flex items-center gap-2 px-4 py-2 bg-white rounded-full shadow-md text-sm font-bold text-gray-600 hover:shadow-lg transition">
                    <span>🔑</span> 로그인
                  </button>
                )}
              </div>

              <div className="relative mb-6">
                <div className="w-48 h-24 overflow-hidden">
                  <div className="w-48 h-48 rounded-full border-[8px] border-red-400 shadow-[inset_0_0_0_8px_#fb923c,inset_0_0_0_16px_#facc15,inset_0_0_0_24px_#4ade80,inset_0_0_0_32px_#60a5fa,inset_0_0_0_40px_#818cf8,inset_0_0_0_48px_#c084fc]"></div>
                </div>
              </div>
              <h1 className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 mb-3">무지개나라</h1>
              <p className="text-gray-500 mb-8 font-medium text-center">무지개다리 건넌 반려동물의 공간 🌈</p>

              <div className="space-y-3 w-full max-w-sm">
                {user ? (
                  <button onClick={() => setCurrentPage('create')} className={`w-full py-5 bg-gradient-to-r from-pink-400 via-rose-400 to-red-400 text-white font-black text-xl rounded-[2rem] ${cs} hover:scale-[1.02] transition-all`}>
                    추모공간 만들기 🌈
                  </button>
                ) : (
                  <button onClick={loginWithGoogle} className={`w-full py-5 bg-gradient-to-r from-pink-400 via-rose-400 to-red-400 text-white font-black text-xl rounded-[2rem] ${cs} hover:scale-[1.02] transition-all`}>
                    로그인하고 추모공간 만들기 🌈
                  </button>
                )}

                {/* 내 추모공간 목록 */}
                {user && myMemorials.length > 0 && (
                  <div className={`bg-white/90 rounded-2xl p-4 ${cs} border-2 border-purple-100`}>
                    <p className="text-xs font-bold text-purple-500 mb-3">💜 내 추모공간</p>
                    <div className="space-y-2">
                      {myMemorials.map((m,i) => (
                        <button key={i} onClick={() => loadMemorial(m.id)} className="w-full flex items-center gap-3 p-2 hover:bg-purple-50 rounded-xl transition">
                          <div className="w-10 h-10 rounded-xl overflow-hidden bg-gradient-to-br from-purple-100 to-pink-100 flex items-center justify-center flex-shrink-0">
                            {m.photoUrl ? <img src={m.photoUrl} className="w-full h-full object-cover" /> : <span>🐾</span>}
                          </div>
                          <div className="flex-1 text-left">
                            <p className="font-bold text-gray-700 text-sm">{m.name}</p>
                            <p className="text-xs text-gray-400">{m.slug ? `/${m.slug}` : m.id.slice(0,10)+'...'}</p>
                          </div>
                          <span className="text-purple-300">→</span>
                        </button>
                      ))}
                    </div>
                  </div>
                )}

                <div className="flex gap-2">
                  <input type="text" placeholder="이름 또는 ID로 방문..." value={visitId}
                    onChange={e=>setVisitId(e.target.value)}
                    onKeyPress={e=>e.key==='Enter'&&handleVisit()}
                    className="flex-1 px-4 py-3 bg-white rounded-2xl border-2 border-purple-100 focus:outline-none focus:border-purple-300 text-sm" />
                  <button onClick={handleVisit} className="px-4 py-3 bg-gradient-to-r from-cyan-400 to-indigo-400 text-white font-bold rounded-2xl text-sm">방문</button>
                </div>
              </div>

              <a href="./landing.html" className="mt-8 text-gray-400 text-sm font-medium hover:text-purple-400 transition flex items-center gap-1">
                <span>무지개나라가 뭐예요?</span><span>→</span>
              </a>
              <button onClick={() => setShowSupportModal(true)} className={`mt-4 px-8 py-4 bg-gradient-to-r from-purple-400 via-pink-400 to-red-400 text-white font-bold rounded-[2rem] ${cs} flex items-center gap-2 hover:scale-[1.02] transition-all`}>
                ⭐ 무지개나라에 기부하기
              </button>
              <button onClick={() => setCurrentPage('admin')} className="mt-4 text-gray-300 text-xs hover:text-gray-500 transition">관리자</button>
              {showSupportModal && <SupportModal />}
            </div>
          </PageWrapper>
        );
      };

      // ── 추모공간 만들기 ──
      const CreatePage = () => (
        <PageWrapper bg="from-pink-50 via-white to-purple-50">
          <div className="p-6 pb-16">
            <button onClick={() => setCurrentPage('home')} className="text-purple-400 font-bold mb-6 flex items-center gap-2">← 돌아가기</button>
            <h2 className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 mb-2">무지개나라 만들기 🌈</h2>
            <p className="text-gray-400 text-sm mb-6">우리 아이만의 공간을 만들어주세요 🐾</p>
            <div className={`bg-white/90 rounded-[2rem] p-6 ${cs} border-4 border-pink-100 space-y-5`}>
              <div>
                <label className="block text-gray-600 font-bold mb-2 text-sm">🐾 우리 아이 이름 *</label>
                <input type="text" placeholder="예: 뭉치, 오순이" value={formName} onChange={e => setFormName(e.target.value)} className="w-full p-4 bg-gradient-to-r from-pink-50 to-purple-50 rounded-2xl focus:ring-2 focus:ring-pink-300 outline-none" />
              </div>
              <div>
                <label className="block text-gray-600 font-bold mb-2 text-sm">📸 대표 사진</label>
                <label className="block border-4 border-dashed border-purple-200 rounded-3xl p-8 text-center cursor-pointer hover:border-purple-400 transition">
                  {formPhotoPreview
                    ? <img src={formPhotoPreview} className="w-32 h-32 object-cover rounded-2xl mx-auto" />
                    : <><div className="text-5xl mb-3">🌈</div><p className="text-gray-400 font-medium">클릭해서 사진 올리기</p></>
                  }
                  <input type="file" accept="image/*" onChange={handlePhotoChange} className="hidden" />
                </label>
              </div>
              <div>
                <label className="block text-gray-600 font-bold mb-2 text-sm">💕 함께한 시간</label>
                <div className="flex gap-3 items-center">
                  <input type="date" value={formStartDate} onChange={e => setFormStartDate(e.target.value)} className="flex-1 p-3 bg-purple-50 rounded-xl outline-none" />
                  <span className="text-purple-300 font-bold">~</span>
                  <input type="date" value={formEndDate} onChange={e => setFormEndDate(e.target.value)} className="flex-1 p-3 bg-purple-50 rounded-xl outline-none" />
                </div>
              </div>
              <div>
                <label className="block text-gray-600 font-bold mb-2 text-sm">✉️ 전하고 싶은 말</label>
                <textarea placeholder="무지개나라에 있는 우리 아이에게..." value={formMessage} onChange={e => setFormMessage(e.target.value)} className="w-full p-4 bg-gradient-to-r from-blue-50 to-purple-50 rounded-2xl h-28 outline-none resize-none" />
              </div>
              <div className="pt-2"><RainbowBar /></div>
              <div className="bg-gradient-to-r from-pink-50 to-orange-50 rounded-2xl p-4 space-y-3">
                <h3 className="font-bold text-pink-600 text-sm">🌸 부조금 받을 정보 (선택)</h3>
                <div>
                  <label className="block text-gray-500 text-xs font-medium mb-1">카카오페이 링크</label>
                  <input type="text" placeholder="https://qr.kakaopay.com/..." value={formKakao} onChange={e => setFormKakao(e.target.value)} className="w-full p-3 bg-white rounded-xl outline-none text-sm" />
                </div>
                <div>
                  <label className="block text-gray-500 text-xs font-medium mb-1">토스 링크</label>
                  <input type="text" placeholder="https://toss.me/..." value={formToss} onChange={e => setFormToss(e.target.value)} className="w-full p-3 bg-white rounded-xl outline-none text-sm" />
                </div>
                <div className="flex gap-2">
                  <div className="flex-1">
                    <label className="block text-gray-500 text-xs font-medium mb-1">계좌번호</label>
                    <input type="text" placeholder="카카오뱅크 3333-..." value={formAccount} onChange={e => setFormAccount(e.target.value)} className="w-full p-3 bg-white rounded-xl outline-none text-sm" />
                  </div>
                  <div className="w-28">
                    <label className="block text-gray-500 text-xs font-medium mb-1">예금주</label>
                    <input type="text" placeholder="홍길동" value={formAccountName} onChange={e => setFormAccountName(e.target.value)} className="w-full p-3 bg-white rounded-xl outline-none text-sm" />
                  </div>
                </div>
              </div>
              {createError && <p className="text-red-400 text-sm text-center">{createError}</p>}
              <button
                onClick={createMemorial}
                disabled={creating}
                className={`w-full py-5 bg-gradient-to-r from-pink-400 via-purple-400 to-blue-400 text-white font-black text-xl rounded-2xl ${cs} transition-all ${creating ? 'opacity-60' : 'hover:scale-[1.02]'}`}
              >
                {creating ? '사진 업로드 중... ⬆️' : '무지개나라 완성하기 ✨'}
              </button>
            </div>
          </div>
        </PageWrapper>
      );

      // ── 추모공간 ──
      const MemorialPage = () => {
        const m = memorial;
        if (!m) return <div className="min-h-screen flex items-center justify-center"><p className="text-gray-400">불러오는 중... 🌈</p></div>;
        const shareUrl = `${window.location.origin}${window.location.pathname}?id=${m.id}`;
        return (
          <PageWrapper bg="from-sky-100 via-white to-purple-100">
            <div className="pb-6">
              <div className="bg-white/70 backdrop-blur-md p-4 flex justify-between items-center sticky top-0 z-10">
                <button onClick={() => { setCurrentPage('home'); window.history.pushState({}, '', window.location.pathname); }} className="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center text-purple-500 font-bold">←</button>
                <span className="font-bold text-gray-600">{m.name}의 무지개나라 🌈</span>
                <div className="flex gap-2">
                  {user && user.uid === m.uid && (
                    <button onClick={() => setEditMode(true)} className="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center text-yellow-600 text-lg">✏️</button>
                  )}
                  <button onClick={() => setShowShareModal(true)} className="w-10 h-10 bg-pink-100 rounded-full flex items-center justify-center text-pink-500">📤</button>
                </div>

        };
        const shareInstagramStory = () => {
          const W = 1080, H = 1920;
          const canvas = document.createElement("canvas");
          canvas.width = W; canvas.height = H;
          const ctx = canvas.getContext("2d");
          const colors = ["#f87171","#fb923c","#fbbf24","#4ade80","#60a5fa","#818cf8","#c084fc"];

          const drawFinal = (petImg) => {
            // 배경
            const grad = ctx.createLinearGradient(0, 0, W, H);
            grad.addColorStop(0, "#e0f2fe"); grad.addColorStop(0.5, "#fdf4ff"); grad.addColorStop(1, "#fff1f2");
            ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
            // 상단 무지개바
            colors.forEach((c,i) => { ctx.fillStyle=c; ctx.fillRect(i*(W/7), 0, W/7+2, 36); });
            // 카드 배경
            ctx.fillStyle = "rgba(255,255,255,0.9)";
            ctx.beginPath();
            const cx=140, cy=500, cw=W-280, ch=900, r=80;
            ctx.moveTo(cx+r,cy); ctx.lineTo(cx+cw-r,cy);
            ctx.quadraticCurveTo(cx+cw,cy,cx+cw,cy+r);
            ctx.lineTo(cx+cw,cy+ch-r);
            ctx.quadraticCurveTo(cx+cw,cy+ch,cx+cw-r,cy+ch);
            ctx.lineTo(cx+r,cy+ch);
            ctx.quadraticCurveTo(cx,cy+ch,cx,cy+ch-r);
            ctx.lineTo(cx,cy+r);
            ctx.quadraticCurveTo(cx,cy,cx+r,cy);
            ctx.closePath();
            ctx.fill();
            ctx.shadowColor="rgba(0,0,0,0.08)"; ctx.shadowBlur=40; ctx.fill(); ctx.shadowBlur=0;
            // 무지개 상단 카드바
            colors.forEach((c,i) => { ctx.fillStyle=c; ctx.fillRect(cx+i*((cw)/7), cy, cw/7+2, 16); });
            // 반려동물 사진 원형
            const imgSize = 340, imgX = W/2, imgY = cy + 280;
            ctx.save();
            ctx.beginPath();
            ctx.arc(imgX, imgY, imgSize/2, 0, Math.PI*2);
            ctx.clip();
            if (petImg) {
              const s = Math.min(petImg.width, petImg.height);
              const sx = (petImg.width-s)/2, sy = (petImg.height-s)/2;
              ctx.drawImage(petImg, sx, sy, s, s, imgX-imgSize/2, imgY-imgSize/2, imgSize, imgSize);
            } else {
              ctx.fillStyle = "#e9d5ff"; ctx.fillRect(imgX-imgSize/2, imgY-imgSize/2, imgSize, imgSize);
              ctx.font = "160px serif"; ctx.textAlign="center"; ctx.fillText("🐾", imgX, imgY+50);
            }
            ctx.restore();
            // 원형 테두리
            ctx.beginPath(); ctx.arc(imgX, imgY, imgSize/2+8, 0, Math.PI*2);
            ctx.strokeStyle="white"; ctx.lineWidth=12; ctx.stroke();
            // 이름
            ctx.textAlign = "center"; ctx.fillStyle = "#1e1b2e";
            ctx.font = "bold 80px 'Noto Sans KR', sans-serif";
            ctx.fillText(name + "아 잘 지내지? 💜", W/2, cy+590);
            // 날짜 (있으면)
            ctx.font = "48px sans-serif"; ctx.fillStyle = "#9ca3af";
            // 구분선 무지개
            const barY = cy+660, bw=300;
            colors.forEach((c,i) => { ctx.fillStyle=c; ctx.fillRect(W/2-bw/2+i*(bw/7), barY, bw/7+1, 8); });
            // 안내 텍스트
            ctx.font = "bold 56px sans-serif"; ctx.fillStyle = "#8b5cf6";
            ctx.fillText("따뜻한 말을 남겨주세요 💜", W/2, cy+740);
            // 하단 무지개바
            colors.forEach((c,i) => { ctx.fillStyle=c; ctx.fillRect(i*(W/7), H-36, W/7+2, 36); });
            // URL
            ctx.font = "40px sans-serif"; ctx.fillStyle = "#9ca3af";
            ctx.fillText(url.replace("https://",""), W/2, H-60);
            // 무지개나라 로고
            ctx.font = "bold 72px serif"; ctx.fillStyle = "#1e1b2e";
            ctx.fillText("무지개나라 🌈", W/2, cy-40);
            // 다운로드
            const a = document.createElement("a");
            a.download = name + "_무지개나라_스토리.png";
            a.href = canvas.toDataURL("image/png");
            a.click();
          };

          // 사진 있으면 로드, 없으면 바로 그리기
          const photoUrl = memorial && memorial.photoUrl;
          if (photoUrl) {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => drawFinal(img);
            img.onerror = () => drawFinal(null);
            img.src = photoUrl;
          } else {
            drawFinal(null);
          }
        };
        return (
          <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end justify-center z-50">
            <div className={`bg-white w-full max-w-lg rounded-t-[2rem] p-6 ${cs}`}>
              <div className="flex justify-between items-center mb-2">
                <h3 className="text-xl font-black text-gray-700">📤 공유하기</h3>
                <button onClick={() => setShowShareModal(false)} className="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-lg">×</button>
              </div>
              <p className="text-gray-400 text-sm mb-5">{name}의 무지개나라를 함께 기억해주세요 🌈</p>
              <div className="space-y-3">
                <button onClick={shareKakao} className="w-full flex items-center gap-4 p-4 bg-yellow-50 border-2 border-yellow-200 rounded-2xl hover:bg-yellow-100 transition">
                  <div className="w-14 h-14 bg-yellow-400 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0">💬</div>
                  <div className="flex-1 text-left">
                    <p className="font-black text-yellow-800">카카오톡 공유</p>
                    <p className="text-xs text-yellow-600 mt-1">"{name}이(가) 무지개다리를 건넜어요 🌈"</p>
                  </div>
                  <span className="text-yellow-400 text-lg">→</span>
                </button>
                <button onClick={shareInstagramStory} className="w-full flex items-center gap-4 p-4 bg-gradient-to-r from-purple-50 to-pink-50 border-2 border-pink-200 rounded-2xl hover:from-purple-100 hover:to-pink-100 transition">
                  <div className="w-14 h-14 bg-gradient-to-br from-purple-500 via-pink-500 to-orange-400 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0">📷</div>
                  <div className="flex-1 text-left">
                    <p className="font-black text-pink-800">인스타그램 스토리</p>
                    <p className="text-xs text-pink-500 mt-1">스토리용 이미지 다운로드 후 업로드</p>
                  </div>
                  <span className="text-pink-400 text-lg">→</span>
                </button>
                <button onClick={() => copyToClipboard(url, "link")} className="w-full flex items-center gap-4 p-4 bg-gray-50 border-2 border-gray-200 rounded-2xl hover:bg-gray-100 transition">
                  <div className="w-14 h-14 bg-gray-400 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0">🔗</div>
                  <div className="flex-1 text-left">
                    <p className="font-black text-gray-700">링크 복사</p>
                    <p className="text-xs text-gray-400 mt-1 break-all">{url.replace("https://","")}</p>
                  </div>
                  <span className="text-gray-500 text-sm font-bold">{copiedLink ? "✓ 복사됨" : "복사"}</span>
                </button>
              </div>
              <div className="mt-5"><RainbowBar /></div>
            </div>
          </div>
        );
      };

      // ── 관리자 ──
      const AdminPage = () => {
        const [recentMemorials, setRecentMemorials] = useState([]);
        useEffect(() => {
          db.collection('memorials').orderBy('createdAt','desc').limit(10).get()
            .then(snap => setRecentMemorials(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
        }, []);
        return (
          <PageWrapper bg="from-gray-100 to-gray-200">
            <div className="p-6">
              <button onClick={() => setCurrentPage('home')} className="text-gray-500 font-bold mb-6 flex items-center gap-2">← 돌아가기</button>
              <h2 className="text-2xl font-black text-gray-700 mb-6">🔒 관리자 대시보드</h2>
              <div className={`bg-white rounded-2xl p-5 ${cs} mb-4`}>
                <h3 className="font-bold text-gray-700 mb-3">🌈 최근 추모공간</h3>
                {recentMemorials.length === 0 && <p className="text-gray-400 text-sm">아직 추모공간이 없어요</p>}
                <div className="space-y-3">
                  {recentMemorials.map((m,i) => (
                    <button key={i} onClick={() => loadMemorial(m.id)} className="w-full flex items-center gap-3 p-3 bg-gray-50 rounded-2xl hover:bg-purple-50 transition">
                      <div className="w-10 h-10 bg-gradient-to-br from-purple-200 to-pink-200 rounded-xl flex items-center justify-center overflow-hidden">
                        {m.photoUrl ? <img src={m.photoUrl} className="w-full h-full object-cover" /> : <span>🐾</span>}
                      </div>
                      <div className="flex-1 text-left">
                        <p className="font-bold text-gray-700">{m.name}</p>
                        <p className="text-xs text-gray-400">{m.id}</p>
                      </div>
                      <span className="text-purple-300">→</span>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </PageWrapper>
        );
      };


      // ── 방문자 하단 배너 (링크로 들어왔을 때) ──
      const VisitorBanner = ({ name }) => {
        const [showInfo, setShowInfo] = React.useState(false);
        return (
          <div className="fixed bottom-0 left-0 right-0 z-20">
            <div className="max-w-lg mx-auto">
              <div className="bg-white border-t-4 border-purple-200 shadow-2xl px-5 py-4">
                {showInfo && (
                  <div className="bg-gradient-to-r from-purple-50 to-pink-50 rounded-2xl p-4 mb-4">
                    <div className="flex justify-between items-start mb-2">
                      <p className="font-black text-purple-700 text-sm">🌈 무지개나라란?</p>
                      <button onClick={() => setShowInfo(false)} className="text-gray-400 text-lg leading-none">×</button>
                    </div>
                    <p className="text-xs text-gray-600 leading-relaxed">무지개다리를 건넌 반려동물을 위한 온라인 추모 공간이에요. 사랑하는 아이의 사진, 추억, 전하고 싶은 말을 담아 세상에 하나뿐인 공간을 만들 수 있어요 🐾</p>
                  </div>
                )}
                <div className="flex gap-3 items-center">
                  <button onClick={() => setShowInfo(v => !v)} className="flex-1 py-3 bg-gradient-to-r from-purple-100 to-pink-100 text-purple-700 font-bold rounded-2xl text-sm">🌈 무지개나라가 뭐예요?</button>
                  <button onClick={() => { window.history.pushState({}, "", window.location.pathname); window.location.reload(); }} className="flex-1 py-3 bg-gradient-to-r from-pink-400 via-purple-400 to-blue-400 text-white font-black rounded-2xl text-sm shadow-lg">나도 만들어보기 🐾</button>
                </div>
              </div>
            </div>
          </div>
        );
      };
      if (loadingMemorial) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gradient-to-b from-sky-100 to-purple-50">
            <div className="text-center">
              <div className="text-6xl mb-4 animate-bounce">🌈</div>
              <p className="text-gray-500 font-medium">무지개나라 불러오는 중...</p>
            </div>
          </div>
        );
      }

      const renderPage = () => {
        switch(currentPage) {
          case 'create': return (
            <div className="min-h-screen bg-gradient-to-b from-pink-50 via-white to-purple-50">
              <div className="max-w-lg mx-auto p-6 pb-16">
                <button onClick={() => setCurrentPage('home')} className="text-purple-400 font-bold mb-6 flex items-center gap-2">← 돌아가기</button>
                <h2 className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 mb-2">무지개나라 만들기 🌈</h2>
                <p className="text-gray-400 text-sm mb-6">우리 아이만의 공간을 만들어주세요 🐾</p>
                <div className={`bg-white/90 rounded-[2rem] p-6 ${cs} border-4 border-pink-100 space-y-5`}>
                  <div>
                    <label className="block text-gray-600 font-bold mb-2 text-sm">🐾 우리 아이 이름 *</label>
                    <input type="text" placeholder="예: 뭉치, 오순이" value={formName} onChange={e => setFormName(e.target.value)} className="w-full p-4 bg-gradient-to-r from-pink-50 to-purple-50 rounded-2xl focus:ring-2 focus:ring-pink-300 outline-none" />
                  </div>
                  <div>
                    <label className="block text-gray-600 font-bold mb-2 text-sm">🔗 공유 URL (선택)</label>
                    <div className="flex items-center gap-2 p-3 bg-gradient-to-r from-purple-50 to-blue-50 rounded-2xl">
                      <span className="text-xs text-gray-400 whitespace-nowrap">mujigaenara.vercel.app/?id=</span>
                      <input type="text" placeholder="오순이 또는 osuni" value={formSlug} onChange={e=>setFormSlug(e.target.value.replace(/\s/g,''))} className="flex-1 bg-transparent outline-none text-sm font-bold text-purple-700 placeholder-gray-300" />
                    </div>
                    <p className="text-xs text-gray-400 mt-1 ml-1">비워두면 자동으로 ID가 생성돼요</p>
                  </div>
                  <div>
                    <label className="block text-gray-600 font-bold mb-2 text-sm">📸 대표 사진</label>
                    <label className="block border-4 border-dashed border-purple-200 rounded-3xl p-8 text-center cursor-pointer hover:border-purple-400 transition">
                      {formPhotoPreview
                        ? <img src={formPhotoPreview} className="w-32 h-32 object-cover rounded-2xl mx-auto" />
                        : <><div className="text-5xl mb-3">🌈</div><p className="text-gray-400 font-medium">클릭해서 사진 올리기</p></>
                      }
                      <input type="file" accept="image/*" onChange={handlePhotoChange} className="hidden" />
                    </label>
                  </div>
                  <div>
                    <label className="block text-gray-600 font-bold mb-2 text-sm">💕 함께한 시간</label>
                    <div className="flex gap-3 items-center">
                      <input type="date" value={formStartDate} onChange={e => setFormStartDate(e.target.value)} className="flex-1 p-3 bg-purple-50 rounded-xl outline-none" />
                      <span className="text-purple-300 font-bold">~</span>
                      <input type="date" value={formEndDate} onChange={e => setFormEndDate(e.target.value)} className="flex-1 p-3 bg-purple-50 rounded-xl outline-none" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-gray-600 font-bold mb-2 text-sm">✉️ 전하고 싶은 말</label>
                    <textarea placeholder="무지개나라에 있는 우리 아이에게..." value={formMessage} onChange={e => setFormMessage(e.target.value)} className="w-full p-4 bg-gradient-to-r from-blue-50 to-purple-50 rounded-2xl h-28 outline-none resize-none" />
                  </div>
                  <div className="pt-2">
                    <div className="flex h-2 w-full rounded-full overflow-hidden">
                      {['bg-red-400','bg-orange-400','bg-yellow-400','bg-green-400','bg-blue-400','bg-indigo-400','bg-purple-400'].map((c,i)=><div key={i} className={`flex-1 ${c}`}></div>)}
                    </div>
                  </div>
                  <div className="bg-gradient-to-r from-pink-50 to-orange-50 rounded-2xl p-4 space-y-3">
                    <h3 className="font-bold text-pink-600 text-sm">🌸 부조금 받을 계좌 (선택)</h3>
                    <p className="text-xs text-gray-400">입력하면 방문자가 부조금을 보낼 수 있어요</p>
                    <div>
                      <label className="block text-gray-500 text-xs font-medium mb-1">은행 + 계좌번호</label>
                      <input type="text" placeholder="예: 카카오뱅크 3333-12-3456789" value={formAccount} onChange={e => setFormAccount(e.target.value)} className="w-full p-3 bg-white rounded-xl outline-none text-sm border border-pink-100 focus:border-pink-300" />
                    </div>
                    <div>
                      <label className="block text-gray-500 text-xs font-medium mb-1">예금주 이름</label>
                      <input type="text" placeholder="예: 홍길동" value={formAccountName} onChange={e => setFormAccountName(e.target.value)} className="w-full p-3 bg-white rounded-xl outline-none text-sm border border-pink-100 focus:border-pink-300" />
                    </div>
                  </div>
                  {createError && <p className="text-red-400 text-sm text-center">{createError}</p>}
                  <button onClick={createMemorial} disabled={creating}
                    className={`w-full py-5 bg-gradient-to-r from-pink-400 via-purple-400 to-blue-400 text-white font-black text-xl rounded-2xl ${cs} transition-all ${creating ? 'opacity-60' : 'hover:scale-[1.02]'}`}>
                    {creating ? '사진 업로드 중... ⬆️' : '무지개나라 완성하기 ✨'}
                  </button>
                </div>
              </div>
            </div>
          );
          case 'memorial': return <MemorialPage />;
          case 'album': return <AlbumPage />;
          case 'messages': return (
            <div className="min-h-screen bg-gradient-to-b from-blue-50 via-white to-purple-50">
              <div className="max-w-lg mx-auto pb-36">
                <div className="bg-white/70 p-4 flex justify-between items-center sticky top-0 z-10">
                  <button onClick={() => setCurrentPage('memorial')} className="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-500 font-bold">←</button>
                  <span className="font-bold text-gray-600">추모글 💬</span>
                  <div className="w-10"></div>
                </div>
                <div className="p-4">
                  <div className="flex h-2 w-full rounded-full overflow-hidden">
                    {['bg-red-400','bg-orange-400','bg-yellow-400','bg-green-400','bg-blue-400','bg-indigo-400','bg-purple-400'].map((c,i)=><div key={i} className={`flex-1 ${c}`}></div>)}
                  </div>
                </div>
                <div className="px-4 space-y-4">
                  {messages.length === 0 && (
                    <div className="text-center py-12 text-gray-400">
                      <p className="text-4xl mb-3">🌈</p>
                      <p>첫 번째 추모글을 남겨주세요</p>
                    </div>
                  )}
                  {messages.map((item,i)=>(
                    <div key={item.id||i} className={"bg-white/90 rounded-2xl p-4 " + cs}>
                      <div className="flex items-center gap-3 mb-3">
                        <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-200 via-pink-200 to-blue-200 flex items-center justify-center">🐾</div>
                        <div>
                          <p className="font-bold text-purple-600">{item.name}</p>
                          <p className="text-xs text-gray-400">{item.createdAt?.toDate?.()?.toLocaleDateString('ko-KR') || '방금 전'}</p>
                        </div>
                      </div>
                      <p className="text-gray-600 leading-relaxed">{item.msg}</p>
                    </div>
                  ))}
                </div>
                <div className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md p-4 border-t border-purple-100 z-10">
                  <div className="max-w-lg mx-auto space-y-2">
                    <input type="text" placeholder="이름 (선택)" value={messageName} onChange={e=>{setMessageName(e.target.value);localStorage.setItem('mj_name',e.target.value);}} className="w-full px-4 py-2 bg-purple-50 rounded-full text-sm outline-none" />
                    <div className="flex gap-2">
                      <input type="text" placeholder="무지개나라에 메시지 보내기 🌈" value={newMessage} onChange={e=>setNewMessage(e.target.value)} onKeyPress={e=>{if(e.key==='Enter')sendMessage();}} className="flex-1 p-4 bg-purple-50 rounded-full outline-none" />
                      <button onClick={sendMessage} disabled={sendingMsg} className="px-6 py-4 bg-gradient-to-r from-purple-400 via-pink-400 to-blue-400 text-white font-bold rounded-full">{sendingMsg ? '...' : '전송'}</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
          case 'admin': return <AdminPage />;
          default: return <HomePage />;
        }
      };

      return <div>{renderPage()}</div>;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MujigaeNara />);
  </script>
</body>
</html>
