<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#c084fc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="무지개나라">
  <meta name="description" content="무지개다리를 건넌 반려동물을 위한 온라인 추모 공간 🌈">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>무지개나라 🌈</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    body { font-family: 'Noto Sans KR', sans-serif; }
  </style>
  <script>
    // Firebase 초기화
    const firebaseConfig = {
      apiKey: "AIzaSyA4R0lsICQzNVduEifDg6Dj04cc6iHMcLE",
      authDomain: "mujigaenara-72d15.firebaseapp.com",
      projectId: "mujigaenara-72d15",
      storageBucket: "mujigaenara-72d15.firebasestorage.app",
      messagingSenderId: "931068854532",
      appId: "1:931068854532:web:4f6f40e7fe7009e940d051"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    // 오프라인 캐시 활성화 (재방문 시 속도 대폭 개선)
    db.enablePersistence({ synchronizeTabs: true }).catch(e => {
      if (e.code !== 'failed-precondition' && e.code !== 'unimplemented')
        console.error('캐시 오류:', e);
    });
    const storage = firebase.storage();
    const auth = firebase.auth();
    const googleProvider = new firebase.auth.GoogleAuthProvider();
  </script>
</head>
<body>
  <!-- PWA 설치 유도 배너 (Android/Chrome) -->
  <div id="pwa-install-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:linear-gradient(135deg,#7c3aed,#ec4899);padding:14px 20px;align-items:center;gap:12px;max-width:520px;margin:0 auto;">
    <img src="./icon-192.png" style="width:40px;height:40px;border-radius:10px;flex-shrink:0;">
    <div style="flex:1;">
      <p style="color:white;font-weight:900;font-size:.9rem;margin:0;">무지개나라 앱 설치하기</p>
      <p style="color:rgba(255,255,255,.7);font-size:.75rem;margin:2px 0 0;">홈화면에 추가해서 앱처럼 사용해요 🌈</p>
    </div>
    <button onclick="installPWA()" style="background:white;color:#7c3aed;font-weight:900;border:none;padding:8px 16px;border-radius:20px;font-size:.82rem;cursor:pointer;flex-shrink:0;">설치</button>
    <button onclick="document.getElementById('pwa-install-banner').style.display='none'" style="background:none;border:none;color:rgba(255,255,255,.6);font-size:1.2rem;cursor:pointer;padding:0 4px;flex-shrink:0;">×</button>
  </div>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // URL에서 memorial ID 읽기
    // ⚙️ 관리자 이메일 (본인 구글 이메일로 변경하세요)
    const ADMIN_EMAIL = "lowwall.kr@gmail.com";

    const getMemorialIdFromUrl = () => {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    };

    const MujigaeNara = () => {
      // ── 한국어 조사 자동 판별 유틸 ──
      // 마지막 글자 받침 여부로 아/야, 이/가, 은/는, 을/를 결정
      const getJosa = (name, josaType) => {
        if (!name || name.length === 0) return '';
        const last = name[name.length - 1];
        const code = last.charCodeAt(0);
        // 한글 범위 체크
        if (code < 0xAC00 || code > 0xD7A3) {
          // 한글 아닌 경우 (영문 등) - 기본형 반환
          const defaults = { '아야': '야', '이가': '가', '은는': '는', '을를': '를', '이': '이' };
          return defaults[josaType] || '';
        }
        const batchim = (code - 0xAC00) % 28; // 받침 코드 (0=없음)
        switch(josaType) {
          case '아야': return batchim === 0 ? '야' : '아';   // 쿠야, 뭉치야 / 순이야 → 받침없음=야
          case '이가': return batchim === 0 ? '가' : '이';   // 쿠가, 치가 / 뭉이 → 받침없음=가
          case '은는': return batchim === 0 ? '는' : '은';
          case '을를': return batchim === 0 ? '를' : '을';
          case '이': return batchim === 0 ? '' : '이';       // 이(가) 의 '이' - 받침없으면 생략
          default: return '';
        }
      };
      // 편의 함수: "뭉치야" / "순이아" 처럼 이름+호칭 반환
      const nameWith = (name, josaType) => name + getJosa(name, josaType);
      // "이(가)" → "가" or "이가" 처리
      const nameIga = (name) => {
        if (!name) return '';
        const last = name[name.length - 1];
        const code = last.charCodeAt(0);
        if (code < 0xAC00 || code > 0xD7A3) return name + '이(가)';
        const batchim = (code - 0xAC00) % 28;
        return name + (batchim === 0 ? '가' : '이');
      };

      const [currentPage, setCurrentPage] = useState('home');
      const [showDonationModal, setShowDonationModal] = useState(false);
      const [showSupportModal, setShowSupportModal] = useState(false);
      const [showShareModal, setShowShareModal] = useState(false);
      const [showDonationListModal, setShowDonationListModal] = useState(false);
      const [copiedAccount, setCopiedAccount] = useState(false);
      const [copiedSupportAccount, setCopiedSupportAccount] = useState(false);
      const [copiedLink, setCopiedLink] = useState(false);
      const [donationMessage, setDonationMessage] = useState('');
      const [supportMessage, setSupportMessage] = useState('');
      const [donationComplete, setDonationComplete] = useState(false);
      const [supportComplete, setSupportComplete] = useState(false);

      // 추모공간 생성 폼
      const [formName, setFormName] = useState('');
      const [formStartDate, setFormStartDate] = useState('');
      const [formEndDate, setFormEndDate] = useState('');
      const [formMessage, setFormMessage] = useState('');
      const [formPhoto, setFormPhoto] = useState(null);
      const [formPhotoPreview, setFormPhotoPreview] = useState(null);
      const [formKakao, setFormKakao] = useState('');
      const [formToss, setFormToss] = useState('');
      const [formAccount, setFormAccount] = useState('');
      const [formAccountName, setFormAccountName] = useState('');
      const [creating, setCreating] = useState(false);
      const [createError, setCreateError] = useState('');

      // 현재 보고 있는 추모공간
      const [memorial, setMemorial] = useState(null);
      const [memorialId, setMemorialId] = useState(null);
      const [loadingMemorial, setLoadingMemorial] = useState(false);

      // 추모글
      const [messages, setMessages] = useState([]);
      const [newMessage, setNewMessage] = useState('');
      const [messageName, setMessageName] = useState(localStorage.getItem('mj_name') || '');
      const [sendingMsg, setSendingMsg] = useState(false);

      // 부조금 목록
      const [donationList, setDonationList] = useState([]);

      // 로그인 상태
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [myMemorials, setMyMemorials] = useState([]);

      // 추모공간 수정
      const [editMode, setEditMode] = useState(false);

      // slug
      const [formSlug, setFormSlug] = useState('');
      const [slugError, setSlugError] = useState('');
      const [formVocative, setFormVocative] = useState('auto'); // 'auto' | '야' | '아'

      const cs = "shadow-[4px_4px_0px_0px_rgba(0,0,0,0.08)]";

      // 로그인 상태 감지
      useEffect(() => {
        // authLoading은 true로 시작 - getRedirectResult 완료 후 해제
        let redirectChecked = false;

        const finishLoading = (u) => {
          setUser(u);
          setAuthLoading(false);
          if (u) loadMyMemorials(u.uid);
        };

        // 1단계: redirect 결과 먼저 확인 (모바일 redirect 로그인 복귀 시)
        auth.getRedirectResult().then(result => {
          redirectChecked = true;
          if (result && result.user) {
            console.log("redirect 로그인 성공:", result.user.email);
            // onAuthStateChanged가 이어서 처리하므로 여기선 별도 처리 불필요
          }
        }).catch(e => {
          redirectChecked = true;
          if (e.code !== 'auth/no-auth-event') console.error("redirect 오류:", e.code);
        });

        // 2단계: onAuthStateChanged로 최종 상태 반영
        const unsub = auth.onAuthStateChanged(u => {
          // redirect 체크가 아직 안 끝났으면 잠깐 대기 (타이밍 버그 방지)
          if (!redirectChecked) {
            setTimeout(() => finishLoading(u), 800);
          } else {
            finishLoading(u);
          }
        });
        return () => unsub();
      }, []);

      // URL에 memorial ID 또는 slug로 바로 추모공간으로
      useEffect(() => {
        const id = getMemorialIdFromUrl();
        if (id) {
          // slug인지 doc id인지 판단 (slug는 짧고 한글/영문)
          if (id.length < 25) {
            // slug로 먼저 찾기
            db.collection('memorials').where('slug','==',id).limit(1).get().then(snap => {
              if (!snap.empty) loadMemorial(snap.docs[0].id);
              else loadMemorial(id); // fallback to doc id
            });
          } else {
            loadMemorial(id);
          }
        }
      }, []);

      // 내 추모공간 목록
      const loadMyMemorials = async (uid) => {
        const snap = await db.collection('memorials').where('uid','==',uid).orderBy('createdAt','desc').get();
        setMyMemorials(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      };

      // 구글 로그인
      const loginWithGoogle = async () => {
        // 인앱브라우저 (카카오톡/인스타) 감지
        const ua = navigator.userAgent;
        const isKakao = /KAKAOTALK/i.test(ua);
        const isInsta = /Instagram/i.test(ua);
        const isNaverApp = /NAVER/i.test(ua) && !/NaverSearch/i.test(ua);
        const isLineApp = /\bLine\b/i.test(ua);
        const isWebView = isKakao || isInsta || isNaverApp || isLineApp ||
                          /FB_IAB|fban|fbav/i.test(ua) ||
                          ((/wv\)/i.test(ua) || /; wv\)/i.test(ua)) && /Android/i.test(ua));

        if (isWebView) {
          const appName = isKakao ? '카카오톡' : isInsta ? '인스타그램' : '현재 앱';
          alert(appName + " 내에서는 구글 로그인이 제한돼요 😢\n\n" +
                "📌 해결 방법:\n" +
                "오른쪽 상단 메뉴(⋮ 또는 ···)를 누르고\n" +
                "'외부 브라우저로 열기' 또는 'Chrome으로 열기'를 선택해주세요!");
          return;
        }

        try {
          // popup 방식 시도 (모바일/PC 모두 - 가장 안정적)
          await auth.signInWithPopup(googleProvider);
        } catch(e) {
          console.error("popup 오류:", e.code);
          // popup 차단됐을 때만 redirect로 fallback
          if (
            e.code === 'auth/popup-blocked' ||
            e.code === 'auth/popup-closed-by-user' ||
            e.code === 'auth/cancelled-popup-request' ||
            e.code === 'auth/operation-not-supported-in-this-environment'
          ) {
            try {
              // redirect 전에 안내
              const go = window.confirm(
                "팝업이 차단됐어요 😅\n\n'확인'을 누르면 구글 로그인 페이지로 이동해요.\n로그인 완료 후 자동으로 돌아와요!"
              );
              if (go) await auth.signInWithRedirect(googleProvider);
            } catch(e2) {
              console.error("redirect 오류:", e2);
              alert("로그인에 실패했어요. 잠시 후 다시 시도해주세요 🙏");
            }
          } else if (e.code !== 'auth/popup-closed-by-user' && e.code !== 'auth/cancelled-popup-request') {
            alert("로그인 오류: " + (e.message || e.code));
          }
        }
      };

      // 로그아웃
      const logout = async () => {
        await auth.signOut();
        setMyMemorials([]);
      };

      // 추모공간 불러오기
      const loadMemorial = async (id) => {
        setLoadingMemorial(true);
        try {
          const doc = await db.collection('memorials').doc(id).get();
          if (doc.exists) {
            setMemorial({ id: doc.id, ...doc.data() });
            setMemorialId(doc.id);
            setCurrentPage('memorial');
            // 추모글 불러오기
            loadMessages(doc.id);
          } else {
            alert('존재하지 않는 추모공간이에요 🌈');
          }
        } catch (e) {
          console.error(e);
        }
        setLoadingMemorial(false);
      };

      // 추모글 실시간 불러오기
      const loadMessages = (id) => {
        db.collection('memorials').doc(id).collection('messages')
          .orderBy('createdAt', 'desc')
          .onSnapshot(snapshot => {
            setMessages(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
          });
      };

      // 추모공간 생성
      const createMemorial = async () => {
        if (!formName.trim()) { setCreateError('이름을 입력해주세요'); return; }
        if (!user) { setCreateError('로그인이 필요해요'); return; }
        // slug 중복 체크
        if (formSlug.trim()) {
          const existing = await db.collection('memorials').where('slug','==',formSlug.trim()).get();
          if (!existing.empty) { setCreateError('이미 사용중인 URL이에요. 다른 이름을 써주세요'); return; }
        }
        setCreating(true);
        setCreateError('');
        try {
          let photoUrl = null;
          // 사진 업로드
          if (formPhoto) {
            const ref = storage.ref(`memorials/${Date.now()}_${formPhoto.name}`);
            await ref.put(formPhoto);
            photoUrl = await ref.getDownloadURL();
          }
          // Firestore에 저장
          const docRef = await db.collection('memorials').add({
            name: formName,
            vocative: formVocative === 'auto' ? null : formVocative,
            startDate: formStartDate,
            endDate: formEndDate,
            message: formMessage,
            photoUrl,
            kakao: formKakao,
            toss: formToss,
            account: formAccount,
            accountName: formAccountName,
            slug: formSlug.trim() || null,
            uid: user.uid,
            ownerName: user.displayName,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          // URL 업데이트
          window.history.pushState({}, '', `?id=${docRef.id}`);
          await loadMemorial(docRef.id);
        } catch (e) {
          setCreateError('오류가 발생했어요. 다시 시도해주세요.');
          console.error(e);
        }
        setCreating(false);
      };

      // 추모글 전송
      const sendMessage = async () => {
        if (!newMessage.trim() || !memorialId) return;
        setSendingMsg(true);
        try {
          await db.collection('memorials').doc(memorialId).collection('messages').add({
            name: messageName.trim() || '익명',
            msg: newMessage.trim(),
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          setNewMessage('');
          setMessageName('');
        } catch (e) { console.error(e); }
        setSendingMsg(false);
      };

      // 추모공간 수정 저장
      const saveEditMemorial = async (updates) => {
        if (!memorial || !user || memorial.uid !== user.uid) return;
        try {
          await db.collection('memorials').doc(memorial.id).update(updates);
          setMemorial(prev => ({ ...prev, ...updates }));
          setEditMode(false);
        } catch(e) { console.error(e); }
      };

      const copyToClipboard = (text, type) => {
        navigator.clipboard.writeText(text);
        if (type === 'donation') { setCopiedAccount(true); setTimeout(() => setCopiedAccount(false), 2000); }
        else if (type === 'support') { setCopiedSupportAccount(true); setTimeout(() => setCopiedSupportAccount(false), 2000); }
        else { setCopiedLink(true); setTimeout(() => setCopiedLink(false), 2000); }
      };

      const handlePhotoChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          setFormPhoto(file);
          const reader = new FileReader();
          reader.onload = (ev) => setFormPhotoPreview(ev.target.result);
          reader.readAsDataURL(file);
        }
      };

      const RainbowBar = () => (
        <div className="flex h-2 w-full rounded-full overflow-hidden">
          {['bg-red-400','bg-orange-400','bg-yellow-400','bg-green-400','bg-blue-400','bg-indigo-400','bg-purple-400'].map((c,i) => (
            <div key={i} className={`flex-1 ${c}`}></div>
          ))}
        </div>
      );

      const PageWrapper = ({ children, bg = "from-sky-100 via-white to-purple-50" }) => (
        <div className={`min-h-screen bg-gradient-to-b ${bg}`}>
          <div className="max-w-lg mx-auto">{children}</div>
        </div>
      );

      // ── 홈 ──
      const HomePage = () => {
        const [visitId, setVisitId] = React.useState('');
        const handleVisit = () => { if(visitId.trim()) loadMemorial(visitId.trim()); };
        return (
          <PageWrapper>
            <div className="flex flex-col items-center justify-center min-h-screen p-8 relative overflow-hidden">
              <div className="absolute top-20 left-5 w-16 h-16 bg-red-200 rounded-full opacity-40 blur-sm"></div>
              <div className="absolute top-40 right-10 w-12 h-12 bg-orange-200 rounded-full opacity-50 blur-sm"></div>
              <div className="absolute bottom-40 left-10 w-12 h-12 bg-blue-200 rounded-full opacity-50 blur-sm"></div>
              <div className="absolute bottom-20 right-20 w-16 h-16 bg-purple-200 rounded-full opacity-40 blur-sm"></div>

              {/* 상단 로그인 바 */}
              <div className="absolute top-4 right-4 z-10">
                {user ? (
                  <div className="flex items-center gap-2">
                    <img src={user.photoURL} className="w-8 h-8 rounded-full" />
                    <button onClick={logout} className="text-xs text-gray-400 hover:text-gray-600 transition">로그아웃</button>
                  </div>
                ) : (
                  <button onClick={loginWithGoogle} className="flex items-center gap-2 px-4 py-2 bg-white rounded-full shadow-md text-sm font-bold text-gray-600 hover:shadow-lg transition">
                    <span>🔑</span> 로그인
                  </button>
                )}
              </div>

              <div className="relative mb-6">
                <div className="w-48 h-24 overflow-hidden">
                  <div className="w-48 h-48 rounded-full border-[8px] border-red-400 shadow-[inset_0_0_0_8px_#fb923c,inset_0_0_0_16px_#facc15,inset_0_0_0_24px_#4ade80,inset_0_0_0_32px_#60a5fa,inset_0_0_0_40px_#818cf8,inset_0_0_0_48px_#c084fc]"></div>
                </div>
              </div>
              <h1 className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 mb-3">무지개나라</h1>
              <p className="text-gray-500 mb-8 font-medium text-center">무지개다리 건넌 반려동물의 공간 🌈</p>

              <div className="space-y-3 w-full max-w-sm">
                {user ? (
                  <button onClick={() => setCurrentPage('create')} className={`w-full py-5 bg-gradient-to-r from-pink-400 via-rose-400 to-red-400 text-white font-black text-xl rounded-[2rem] ${cs} hover:scale-[1.02] transition-all`}>
                    추모공간 만들기 🌈
                  </button>
                ) : (
                  <button onClick={loginWithGoogle} className={`w-full py-5 bg-gradient-to-r from-pink-400 via-rose-400 to-red-400 text-white font-black text-xl rounded-[2rem] ${cs} hover:scale-[1.02] transition-all`}>
                    로그인하고 추모공간 만들기 🌈
                  </button>
                )}

                {/* 내 추모공간 목록 */}
                {user && myMemorials.length > 0 && (
                  <div className={`bg-gradient-to-br from-purple-50 to-pink-50 rounded-2xl p-4 ${cs} border-2 border-purple-100`}>
                    <div className="flex items-center justify-between mb-3">
                      <p className="text-sm font-black text-purple-600">💜 내가 만든 추모공간</p>

          const drawFinal = (petImg) => {
            // 어두운 추모 배경
            const grad = ctx.createLinearGradient(0, 0, W, H);
            grad.addColorStop(0, "#1a0a2e");
            grad.addColorStop(0.4, "#2d1b4e");
            grad.addColorStop(0.7, "#1a1535");
            grad.addColorStop(1, "#0d1117");
            ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

            // 별 파티클
            [[0.1,0.15,2],[0.8,0.22,1.5],[0.15,0.68,2],[0.85,0.78,1],[0.6,0.1,3],[0.3,0.85,1.5]].forEach(([x,y,r]) => {

            // 로고

            glow.addColorStop(1, "transparent");
            ctx.fillStyle = glow; ctx.fillRect(imgX-imgSize, imgY-imgSize, imgSize*2, imgSize*2);

            // 사진 원형
            ctx.save();
            ctx.beginPath(); ctx.arc(imgX, imgY, imgSize/2, 0, Math.PI*2); ctx.clip();
            if (petImg) {
              const s = Math.min(petImg.width, petImg.height);
              const sx = (petImg.width-s)/2, sy = (petImg.height-s)/2;
              ctx.drawImage(petImg, sx, sy, s, s, imgX-imgSize/2, imgY-imgSize/2, imgSize, imgSize);
              ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.fillRect(imgX-imgSize/2, imgY-imgSize/2, imgSize, imgSize);
            } else {
              ctx.fillStyle = "#3d1a6e"; ctx.fillRect(imgX-imgSize/2, imgY-imgSize/2, imgSize, imgSize);
              ctx.font = "200px serif"; ctx.fillStyle="rgba(255,255,255,0.3)"; ctx.fillText("🐾", imgX, imgY+60);
            }
            ctx.restore();

            // 원형 테두리
            ctx.beginPath(); ctx.arc(imgX, imgY, imgSize/2+4, 0, Math.PI*2);
            ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.lineWidth = 6; ctx.stroke();

            // 하단 페이드
            const fade = ctx.createLinearGradient(0, imgY+imgSize/2-100, 0, imgY+imgSize/2+200);
            fade.addColorStop(0, "transparent");
            fade.addColorStop(1, "#1a0a2e");
            ctx.fillStyle = fade; ctx.fillRect(0, imgY+imgSize/2-100, W, 300);

            // 이름

            ctx.fillStyle = "white";
            ctx.shadowColor = "rgba(180,120,255,0.5)"; ctx.shadowBlur = 30;
            ctx.fillText(name, W/2, 1080);
            ctx.shadowBlur = 0;

            // 무지개 구분선
            const lineY = 1130, lw = 120;
            colors.forEach((c,i) => { ctx.fillStyle=c; ctx.fillRect(W/2-lw/2+i*(lw/7), lineY, lw/7+1, 4); });

            // 날짜+이름 메시지 (카카오 멘트 스타일)
            const mMonth = memorial && memorial.endDate ? new Date(memorial.endDate).getMonth()+1 : null;

              : name + "이(가) 무지개다리를 건넜어요 🌈";
            ctx.font = "bold 46px sans-serif";
            ctx.fillStyle = "rgba(255,255,255,0.85)";
            ctx.fillText(mainMsg, W/2, 1200);
            ctx.font = "40px sans-serif";
            ctx.fillStyle = "rgba(255,255,255,0.55)";
            ctx.fillText("무지개나라로 와서 따뜻한 말을 남겨주세요 💜", W/2, 1260);

            // CTA 박스
            ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 2;
            const bx=W/2-280, by=1310, bw2=560, bh=90, br=45;
            ctx.beginPath();
            ctx.moveTo(bx+br,by); ctx.lineTo(bx+bw2-br,by);

            ctx.lineTo(bx+bw2,by+bh-br);
            ctx.quadraticCurveTo(bx+bw2,by+bh,bx+bw2-br,by+bh);
            ctx.lineTo(bx+br,by+bh);
            ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-br);
            ctx.lineTo(bx,by+br);
            ctx.quadraticCurveTo(bx,by,bx+br,by);
            ctx.closePath(); ctx.stroke();
            ctx.font = "40px sans-serif";
            ctx.fillStyle = "rgba(255,255,255,0.5)";
            ctx.fillText("✦  추모 메시지 남기기  ✦", W/2, 1368);

            // URL
            ctx.font = "36px sans-serif";
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            ctx.fillText(url.replace("https://",""), W/2, H-30);

            // 하단 무지개바
            colors.forEach((c,i) => { ctx.fillStyle=c; ctx.fillRect(i*(W/7), H-12, W/7+2, 12); });

            const a = document.createElement("a");
            a.download = name + "_무지개나라_스토리.png";
            a.href = canvas.toDataURL("image/png");
            a.click();
          };

                <div className="bg-white/70 p-4 flex justify-between items-center sticky top-0 z-10">
                  <button onClick={() => setCurrentPage('memorial')} className="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-500 font-bold">←</button>
                  <span className="font-bold text-gray-600">추모글 💬</span>
                  <div className="w-10"></div>
                </div>
                <div className="p-4">
                  <div className="flex h-2 w-full rounded-full overflow-hidden">
                    {['bg-red-400','bg-orange-400','bg-yellow-400','bg-green-400','bg-blue-400','bg-indigo-400','bg-purple-400'].map((c,i)=><div key={i} className={`flex-1 ${c}`}></div>)}
                  </div>
                </div>
                <div className="px-4 space-y-4">
                  {messages.length === 0 && (
                    <div className="text-center py-12 text-gray-400">
                      <p className="text-4xl mb-3">🌈</p>
                      <p>첫 번째 추모글을 남겨주세요</p>
                    </div>
                  )}
                  {messages.map((item,i)=>(
                    <div key={item.id||i} className={"bg-white/90 rounded-2xl p-4 " + cs}>
                      <div className="flex items-center gap-3 mb-3">
                        <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-200 via-pink-200 to-blue-200 flex items-center justify-center">🐾</div>
                        <div>
                          <p className="font-bold text-purple-600">{item.name}</p>
                          <p className="text-xs text-gray-400">{item.createdAt?.toDate?.()?.toLocaleDateString('ko-KR') || '방금 전'}</p>
                        </div>
                      </div>
                      <p className="text-gray-600 leading-relaxed">{item.msg}</p>
                    </div>
                  ))}
                </div>
                <div className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md p-4 border-t border-purple-100 z-10">
                  <div className="max-w-lg mx-auto space-y-2">
                    <input type="text" placeholder="이름 (선택)" value={messageName} onChange={e=>{setMessageName(e.target.value);localStorage.setItem('mj_name',e.target.value);}} className="w-full px-4 py-2 bg-purple-50 rounded-full text-sm outline-none" />
                    <div className="flex gap-2">
                      <input type="text" placeholder="무지개나라에 메시지 보내기 🌈" value={newMessage} onChange={e=>setNewMessage(e.target.value)} onKeyPress={e=>{if(e.key==='Enter')sendMessage();}} className="flex-1 p-4 bg-purple-50 rounded-full outline-none" />
                      <button onClick={sendMessage} disabled={sendingMsg} className="px-6 py-4 bg-gradient-to-r from-purple-400 via-pink-400 to-blue-400 text-white font-bold rounded-full">{sendingMsg ? '...' : '전송'}</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
          case 'admin': return <AdminPage />;
          case 'review': return <ReviewPage />;
          default: return <HomePage />;
        }
      };

      return <div>{renderPage()}</div>;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MujigaeNara />);
  </script>
  <script>
    // PWA Service Worker 등록
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('SW 등록 완료:', reg.scope))
          .catch(e => console.log('SW 등록 실패:', e));
      });
    }

    // iOS 홈화면 추가 유도 배너
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      // 3초 후 설치 배너 표시
      setTimeout(() => {
        const banner = document.getElementById('pwa-install-banner');
        if (banner) banner.style.display = 'flex';
      }, 3000);
    });

    window.addEventListener('appinstalled', () => {
      const banner = document.getElementById('pwa-install-banner');
      if (banner) banner.style.display = 'none';
      deferredPrompt = null;
    });

    function installPWA() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(r => { deferredPrompt = null; });
      }
      const banner = document.getElementById('pwa-install-banner');
      if (banner) banner.style.display = 'none';
    }
  </script>
</body>
</html>
